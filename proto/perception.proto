syntax = "proto3";

package aria.perception.v1;

// go_package: import path for generated Go code.
// The alias suffix (;perceptionv1) sets the Go package name cleanly.
option go_package = "github.com/sucheet2000/aria/backend/gen/go/perception/v1;perceptionv1";

// ─── Core Data Types ──────────────────────────────────────────────────────────

// Point3D represents a single normalized landmark coordinate in 3D space.
//
// Tag budget:
//   1–3  : hot-path float fields — every frame, every landmark. Tags 1-15
//          encode in 1 byte (field_number << 3 | wire_type < 128). Float is
//          always 4-byte fixed, so 1+4 = 5 bytes per axis. Tight.
//   4–8  : RESERVED — TurboQuant compressed variants (Week 3 / Week 9).
//          Future int32 x_quantized/y_quantized/z_quantized fields for
//          extreme compression will slot here without breaking this contract.
message Point3D {
  float x = 1;
  float y = 2;
  float z = 3; // depth axis — primary coordinate for Week 9 Spatial Anchoring

  // Reserved for TurboQuant int32 quantized fields and depth metadata.
  // DO NOT assign these numbers to new fields — doing so breaks wire compatibility.
  reserved 4, 5, 6, 7, 8;
  reserved "x_quantized", "y_quantized", "z_quantized", "confidence", "depth_raw";
}

// ─── Enumerations ─────────────────────────────────────────────────────────────

// Handedness classifies which hand produced the gesture event.
// Using an enum (not bool) allows a safe UNSPECIFIED zero-value default in both
// Go and Python, avoiding silent false-y bugs when the field is absent on the wire.
enum Handedness {
  HANDEDNESS_UNSPECIFIED = 0;
  HANDEDNESS_LEFT        = 1;
  HANDEDNESS_RIGHT       = 2;
}

// GestureType classifies the high-level semantic intent of a detected hand pose.
// UNSPECIFIED = 0 is the proto3 default; handlers must guard against it.
enum GestureType {
  GESTURE_TYPE_UNSPECIFIED = 0;
  GESTURE_TYPE_STOP        = 1;
  GESTURE_TYPE_POINT       = 2; // activates pointing_vector derivation (Week 9)
  GESTURE_TYPE_CONFIRM     = 3;
  GESTURE_TYPE_CANCEL      = 4;
}

// ─── Perception Events ────────────────────────────────────────────────────────

// HandGestureEvent is the primary per-frame perception payload.
// Produced by the Python edge layer (MediaPipe) and consumed by the Go backend.
// Transport: gRPC bi-directional stream (Week 3) → migrated to NATS (Week 5).
//
// ┌─────────────────────────────────────────────────────────────────────────┐
// │  TAG BUDGET  (tags 1–15 = 1-byte overhead; 16+ = 2-byte overhead)       │
// ├────┬──────────────────┬────────────────────────────────────────────────┤
// │  1 │ hand             │ Enum — checked before payload; present every    │
// │    │                  │ frame. Lowest tag = fastest decoder branch.     │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  2 │ landmarks        │ 21× Point3D — dominant wire payload. Tag 2      │
// │    │                  │ keeps the length-delimited header at 1 byte.    │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  3 │ sequence_id      │ int64 monotonic counter. Required by Week 2     │
// │    │                  │ Redis Streams for strict ordering during pod     │
// │    │                  │ restarts and session re-hydration events.       │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  4 │ timestamp_us     │ int64 µs since Unix epoch. Chosen over          │
// │    │                  │ google.protobuf.Timestamp (a sub-message) to    │
// │    │                  │ avoid the extra length-delimited wrapper on the  │
// │    │                  │ hot path. Saves ~4 bytes per frame.             │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  5 │ session_id       │ String key for Week 2 session re-hydration      │
// │    │                  │ (Redis). Present on every frame.                │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  6 │ gesture          │ Derived semantic label. Absent when the pose    │
// │    │                  │ classifier is below confidence threshold.       │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  7 │ confidence       │ Classifier confidence [0.0–1.0]. Secondary;     │
// │    │                  │ not always present on the wire.                 │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  8 │ pointing_vector  │ Derived 3D ray; only populated when             │
// │    │                  │ gesture == GESTURE_TYPE_POINT. Feeds Week 9     │
// │    │                  │ Spatial Anchoring registration logic.           │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │  9 │ interrupt_priority│ Stream routing priority for multi-session kill  │
// │    │                  │ signals. Routes Cancel() to highest-priority    │
// │    │                  │ active stream when concurrent sessions exist.   │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │ 10 │ stream_id        │ Exact gRPC stream identifier carried by the     │
// │    │                  │ interrupt payload so StreamRegistry.Cancel()    │
// │    │                  │ can be surgically precise.                      │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │11–12│ RESERVED        │ Week 5 NATS async transport headers.           │
// │    │                  │ Future: nats_subject (string),                  │
// │    │                  │ backpressure_token (string). Required when      │
// │    │                  │ migrating high-frequency landmark streams to     │
// │    │                  │ NATS with DiscardOld consumer policy.           │
// ├────┼──────────────────┼────────────────────────────────────────────────┤
// │13–15│ RESERVED        │ Week 9 Spatial Anchoring & depth data.         │
// │    │                  │ Future: spatial_anchor_id (string),             │
// │    │                  │ depth_confidence (float),                       │
// │    │                  │ registration_state (enum). All still in the     │
// │    │                  │ 1-byte tag range — these fields will be hot     │
// │    │                  │ once spatial anchoring goes live.               │
// └────┴──────────────────┴────────────────────────────────────────────────┘
message HandGestureEvent {
  Handedness hand        = 1;
  repeated Point3D landmarks = 2; // exactly 21 per MediaPipe standard
  int64 sequence_id      = 3;     // monotonic; Redis Streams enforcement (Week 2)
  int64 timestamp_us     = 4;     // microseconds since Unix epoch
  string session_id      = 5;     // session re-hydration key (Week 2)
  GestureType gesture    = 6;
  float confidence       = 7;     // classifier confidence [0.0–1.0]
  Point3D pointing_vector = 8;    // populated only when gesture == POINT (Week 9)

  uint32 interrupt_priority = 9; // stream routing priority for multi-session kill signals
  string stream_id = 10;         // exact gRPC stream identifier for precise cancel

  // Week 5: NATS async transport headers.
  string nats_subject       = 11; // NATS subject this frame was published to
  string backpressure_token = 12; // opaque token for DiscardOld backpressure tracking

  // Reserved for Week 9: Spatial Anchoring and depth confidence fields.
  reserved 13, 14, 15;
  reserved "spatial_anchor_id", "depth_confidence", "registration_state";
}

// ─── Spatial Anchoring ────────────────────────────────────────────────────────

// SpatialAnchor represents a "registered" physical object in 3D world space.
// Anchors are created via the RegisterAnchor RPC and persist across sessions.
// Coordinates must remain geometrically valid — see Critical Design Constraints.
message SpatialAnchor {
  string anchor_id    = 1;
  string label        = 2;
  Point3D position    = 3;
  float radius        = 4; // interaction/collision radius in metres
  int64 created_at_us = 5; // microseconds since Unix epoch (consistent with HandGestureEvent)
}

// ─── gRPC Bi-directional Service ─────────────────────────────────────────────

// CognitionRequest is the client→server message in the StreamCognition RPC.
// The oneof payload ensures exactly one event type is encoded per message,
// keeping the interrupt signal wire-size to a single varint field.
message CognitionRequest {
  string session_id = 1;
  oneof payload {
    HandGestureEvent gesture_event = 2;
    string text_input              = 3;
    bool interrupt_signal          = 4; // Sub-100ms Priority Interrupt (Week 3)
  }
}

// CognitionResponse is the server→client message in the StreamCognition RPC.
message CognitionResponse {
  string session_id              = 1;
  string natural_language_output = 2;
  string symbolic_inference      = 3;
  bool stream_complete           = 4;
}

// CognitionService is the primary gRPC interface between the Python perception
// layer and the Go backend. Bi-directional streaming enables the Priority
// Interrupt Pattern required by the sub-100ms latency constraint.
service CognitionService {
  // StreamCognition: perception events flow in, cognitive responses flow out.
  // The interrupt_signal payload in CognitionRequest kills the active cognitive
  // stream in <100ms when a visual state change is detected (e.g. user exits frame).
  rpc StreamCognition(stream CognitionRequest) returns (stream CognitionResponse);

  // RegisterAnchor: persists a physical object as a 3D spatial anchor.
  // Used by Week 9 pointing-vector logic to "register" real-world objects.
  rpc RegisterAnchor(SpatialAnchor) returns (SpatialAnchor);
}

// ─── PerceptionService (Week 1 gRPC Transport) ───────────────────────────────

// HandData carries the 21 MediaPipe landmarks for a single detected hand.
// Separated from HandGestureEvent so the raw transport layer (PerceptionService)
// can stream all landmark data without requiring a gesture classification.
message HandData {
  Handedness hand            = 1;
  repeated Point3D landmarks = 2; // exactly 21 per MediaPipe standard
}

// PerceptionFrame is the per-frame payload streamed from the Python vision worker
// to the Go backend over PerceptionService.StreamFrames.
// It replaces the stdout JSON pipe introduced in Week 0.
//
// Tag budget (mirrors HandGestureEvent discipline):
//   1 : hands         — repeated HandData; primary payload, lowest tag = 1-byte header
//   2 : timestamp_us  — int64 µs; consistent with HandGestureEvent.timestamp_us
//   3 : session_id    — string; session re-hydration key (Week 2)
message PerceptionFrame {
  repeated HandData hands = 1;
  int64 timestamp_us      = 2;
  string session_id       = 3;
}

// StreamRequest is sent by the Go client when opening a StreamFrames call.
message StreamRequest {
  string session_id = 1;
}

// PerceptionService is the simple one-directional transport between the Python
// vision layer and the Go backend. Frames flow Python → Go.
// Week 3 will extend this to bidirectional via CognitionService.
service PerceptionService {
  // StreamFrames opens a server-streaming RPC. The Python server yields one
  // PerceptionFrame per processed camera frame; Go reads and broadcasts them.
  rpc StreamFrames(StreamRequest) returns (stream PerceptionFrame);
}
